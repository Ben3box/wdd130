<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>How to contact us | River Moss Expeditions</title>
    <meta name="description"
      content="River Moss Expeditions : White-water rafting leader. Experience epic adventures with our expert guides, combining adrenaline, safety, and respect for nature.">
    <meta name="author" content="Benjamin Iriganje">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="site-header">
        <img src="images/logo.jpg" alt="River Moss Logo" class="logo">

        <nav class="navigation">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>River Moss Expeditions</h1>
        <ul>
            <li>1752 NW Market Street</li>
            <li>#4073</li>
            <li>Seattle, WA 98195</li>
            <li>Phone : +257-68-605-786</li>
            <li>E-mail : office@rmossexpeditions.com</li>
        </ul>

        <form>
            <fieldset>
                <legend>Contact Us</legend>

                <label for="full-name">FullName:</label>
                <input type="text" name="user-name" id="full-name" required><br>

                <label for="user-email">E-mail:</label>
                <input type="text" name="email" id="user-email" required><br>

                <p>Message Purpose:</p>
                <input type="radio" name="purpose" id="inquiry" value="general">
                <label for="inquiry">General Inquiry</label><br>

                <input type="radio" name="purpose" id="reservation" value="reservation">
                <label for="reservation">Reservation Question</label><br>

                <input type="radio" name="purpose" id="suggestion" value="suggestion">
                <label for="suggestion">Website Suggestion</label><br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message">Write here your message....</textarea><br>

                <input type="checkbox" name="newsletter" id="subscribe-box">
                <label for="subscribe-box">Please subscribe me to the monthly newsletter</label><br>

            </fieldset>
            <button type="submit">Send Your Message</button>
        </form>

        <h2>We'd love to hear from you!</h2>
        <div class="images">
            <img src="images/happy.png" alt="Happy employee" width="200" height="150">
            <img src="images/happem.png" alt="Happy employee" width="200" height="150">
            <img src="images/happyemployee.png" alt="Happy employee" width="200" height="150">
        </div>

        <section>
            <p>
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2687.505703816194!2d-122.3846665!3d47.6687443!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x549015bc674d8177%3A0x66f6580556272314!2s1752%20NW%20Market%20St%2C%20Seattle%2C%20WA%2098107!5e0!3m2!1sen!2sus!4v1710000000000"
                  width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </p>
        </section>
    </main>
    <footer>
        <p>© 2026 River Moss Expeditions, Benjamin Iriganje</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.jpg" alt="Facebook Icon" width="200">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.jpg" alt="LinkedIn Icon" width="200">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.jpg" alt="Instagram Icon" width="200">
            </a>
        </nav>
    </footer>
</body>

</html>
